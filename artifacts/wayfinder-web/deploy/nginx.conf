server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets, no-cache the HTML shell.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: client-side routes (/destination, /navigate, /qr) all
    # resolve to index.html.
    location / {
        try_files $uri /index.html;
    }
}
