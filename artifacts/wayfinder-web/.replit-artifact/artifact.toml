kind = "web"
previewPath = "/go/"
title = "Wayfinder Web"
version = "1.0.0"
id = "artifacts/wayfinder-web"
router = "path"

[[services]]
name = "web"
paths = [ "/go/" ]
localPort = 21796

[services.development]
run = "pnpm --filter @workspace/wayfinder-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wayfinder-web", "run", "build" ]
serve = "static"
publicDir = "artifacts/wayfinder-web/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21796"
BASE_PATH = "/go/"
