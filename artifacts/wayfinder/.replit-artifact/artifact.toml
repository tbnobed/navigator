kind = "mobile"
previewPath = "/"
title = "Wayfinder"
version = "1.0.0"
id = "artifacts/wayfinder"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 25657

[services.development]
run = "pnpm --filter @workspace/wayfinder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wayfinder", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/wayfinder", "run", "serve" ]

[services.env]
PORT = "25657"
BASE_PATH = "/"
